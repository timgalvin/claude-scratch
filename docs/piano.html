<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      background: #0f0f0f;
      font-family: system-ui, sans-serif;
    }

    h1 {
      color: #888;
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .keyboard {
      position: relative;
      display: flex;
      user-select: none;
    }

    .white {
      width: 60px;
      height: 200px;
      background: #f5f5f0;
      border: 1px solid #999;
      border-radius: 0 0 6px 6px;
      cursor: pointer;
      position: relative;
      transition: background 0.05s;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 10px;
      color: #aaa;
      font-size: 0.75rem;
    }

    .white:active, .white.pressed {
      background: #d0e8ff;
    }

    .black {
      width: 38px;
      height: 120px;
      background: #1a1a1a;
      border: 1px solid #000;
      border-radius: 0 0 4px 4px;
      cursor: pointer;
      position: absolute;
      top: 0;
      z-index: 2;
      transition: background 0.05s;
    }

    .black:active, .black.pressed {
      background: #2a4a6a;
    }

    .hint {
      color: #555;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <h1>one octave</h1>
  <div class="keyboard" id="keyboard"></div>
  <p class="hint">click keys or use keyboard: A S D F G H J K</p>

  <script>
    const notes = [
      { note: 'C4',  freq: 261.63, key: 'a', type: 'white', label: 'C' },
      { note: 'C#4', freq: 277.18, key: null, type: 'black', offset: 42 },
      { note: 'D4',  freq: 293.66, key: 's', type: 'white', label: 'D' },
      { note: 'D#4', freq: 311.13, key: null, type: 'black', offset: 103 },
      { note: 'E4',  freq: 329.63, key: 'd', type: 'white', label: 'E' },
      { note: 'F4',  freq: 349.23, key: 'f', type: 'white', label: 'F' },
      { note: 'F#4', freq: 369.99, key: null, type: 'black', offset: 224 },
      { note: 'G4',  freq: 392.00, key: 'g', type: 'white', label: 'G' },
      { note: 'G#4', freq: 415.30, key: null, type: 'black', offset: 285 },
      { note: 'A4',  freq: 440.00, key: 'h', type: 'white', label: 'A' },
      { note: 'A#4', freq: 466.16, key: null, type: 'black', offset: 346 },
      { note: 'B4',  freq: 493.88, key: 'j', type: 'white', label: 'B' },
      { note: 'C5',  freq: 523.25, key: 'k', type: 'white', label: 'C' },
    ];

    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    function playNote(freq) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);

      // Piano-like envelope: quick attack, medium decay, fade out
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);

      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 1.2);
    }

    const keyboard = document.getElementById('keyboard');
    const keyMap = {};

    // Build white keys first
    notes.filter(n => n.type === 'white').forEach(n => {
      const el = document.createElement('div');
      el.className = 'white';
      el.innerHTML = `<span>${n.label}</span>`;
      el.addEventListener('mousedown', () => { playNote(n.freq); flash(el); });
      el.addEventListener('touchstart', e => { e.preventDefault(); playNote(n.freq); flash(el); });
      keyboard.appendChild(el);
      if (n.key) keyMap[n.key] = { el, freq: n.freq };
    });

    // Overlay black keys
    notes.filter(n => n.type === 'black').forEach(n => {
      const el = document.createElement('div');
      el.className = 'black';
      el.style.left = n.offset + 'px';
      el.addEventListener('mousedown', () => { playNote(n.freq); flash(el); });
      el.addEventListener('touchstart', e => { e.preventDefault(); playNote(n.freq); flash(el); });
      keyboard.appendChild(el);
    });

    function flash(el) {
      el.classList.add('pressed');
      setTimeout(() => el.classList.remove('pressed'), 150);
    }

    document.addEventListener('keydown', e => {
      if (e.repeat) return;
      const k = keyMap[e.key.toLowerCase()];
      if (k) { playNote(k.freq); flash(k.el); }
    });
  </script>
</body>
</html>
