<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You Got This</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 400;
      color: #888;
      letter-spacing: 0.05em;
    }

    button {
      padding: 0.9rem 2.4rem;
      font-size: 1.1rem;
      font-weight: 600;
      background: #6c47ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover { background: #7f5fff; }
    button:active { transform: scale(0.97); }

    #message {
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      max-width: 520px;
      line-height: 1.5;
      min-height: 3rem;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #message.visible { opacity: 1; }
  </style>
</head>
<body>
  <h1>need a pick-me-up?</h1>
  <button onclick="encourage()">Hit me</button>
  <p id="message"></p>

  <script>
    const messages = [
      "You are doing an amazing job. Statistically, most people aren't. You're beating the odds.",
      "Failure is just success that got lost and had to ask for directions. You're almost there.",
      "You've survived 100% of your bad days so far. That's an undefeated record. Respect.",
      "Some people believe in you. Others haven't met you yet. Either way, the math is trending up.",
      "Whatever you're working on, a future version of you is going to be so glad you didn't quit today."
    ];

    let last = -1;

    function encourage() {
      let idx;
      do { idx = Math.floor(Math.random() * messages.length); } while (idx === last);
      last = idx;

      const el = document.getElementById('message');
      el.classList.remove('visible');
      setTimeout(() => {
        el.textContent = messages[idx];
        el.classList.add('visible');
      }, 150);
    }
  </script>
</body>
</html>
